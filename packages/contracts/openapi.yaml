openapi: 3.1.0
info:
  title: Phatsema Portal API
  version: 1.0.0
  description: |
    Versioned JSON API for the Phatsema back-office demonstration portal.
    Session-cookie authentication, Problem Details errors, decimal-string quantities,
    ULID identifiers, and immutable inventory ledger semantics.
    All demo records carry a `DEMO-` prefix on visible identifiers.
servers:
  - url: /api/v1
tags:
  - name: Auth
    description: Session authentication and the current demo persona.
  - name: Demo
    description: Reset and manage the isolated demonstration state.
  - name: Dashboard
    description: Operational summaries and activity indicators.
  - name: Reference
    description: Controlled categories, units, and reason codes.
  - name: Sites
    description: Sites, warehouses, and storage locations.
  - name: Items
    description: Inventory catalogue and item master data.
  - name: Inventory
    description: Stock balances and immutable movement history.
  - name: StockActions
    description: Receipts, issues, adjustments, and reversals.
  - name: Transfers
    description: Controlled inter-site stock transfers.
  - name: Counts
    description: Stock counts, variance review, and posting.
  - name: Assets
    description: Lightweight controlled-asset register.
  - name: Alerts
    description: Operational exceptions and user notifications.
  - name: Reports
    description: Read-only operational reports and CSV-ready data.
  - name: Audit
    description: Immutable records of state-changing actions.
  - name: System
    description: Application health and version diagnostics.

security:
  - cookieAuth: []

paths:
  /csrf-cookie:
    get:
      operationId: getCsrfCookie
      tags: [Auth]
      summary: Establish the CSRF cookie and session
      security: []
      responses:
        '204':
          description: CSRF cookie set
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /auth/login:
    post:
      operationId: login
      tags: [Auth]
      summary: Authenticate a demo user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginInput' }
      responses:
        '200':
          description: Authenticated user
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserEnvelope' }
        '422': { $ref: '#/components/responses/ValidationProblem' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /auth/logout:
    post:
      operationId: logout
      tags: [Auth]
      summary: End the current session
      responses:
        '204': { description: Session ended }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/me:
    get:
      operationId: currentUser
      tags: [Auth]
      summary: Current user, roles, permissions, and assigned sites
      responses:
        '200':
          description: Current session user
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /profile:
    patch:
      operationId: updateCurrentProfile
      tags: [Auth]
      summary: Update the authenticated user's personal work profile
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProfileUpdate' }
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationProblem' }

  /profile/password:
    post:
      operationId: changeCurrentPassword
      tags: [Auth]
      summary: Change the authenticated user's password
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PasswordChange' }
      responses:
        '200':
          description: Password changed and current session retained
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationProblem' }

  /users:
    get:
      operationId: listUsers
      tags: [Auth]
      summary: List managed users
      responses:
        '200':
          description: Users
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/User' } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      operationId: createUser
      tags: [Auth]
      summary: Create a user with role and site access
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserInput' }
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserEnvelope' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationProblem' }

  /users/{userId}:
    parameters:
      - name: userId
        in: path
        required: true
        schema: { $ref: '#/components/schemas/Ulid' }
    patch:
      operationId: updateUser
      tags: [Auth]
      summary: Update role, site access, status, or temporary password
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserUpdate' }
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserEnvelope' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationProblem' }

  /roles:
    get:
      operationId: listRoles
      tags: [Auth]
      summary: List protected system roles and permissions
      responses:
        '200':
          description: Roles
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/Role' } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /demo/reset:
    post:
      operationId: resetDemo
      tags: [Demo]
      summary: Reset current demo state to the original fixtures (administrator only)
      responses:
        '200':
          description: Demo state reset
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [fixtureVersion, resetAt]
                    properties:
                      fixtureVersion: { type: string }
                      resetAt: { $ref: '#/components/schemas/Timestamp' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /dashboard:
    get:
      operationId: getDashboard
      tags: [Dashboard]
      summary: Role- and filter-aware dashboard summary
      parameters:
        - $ref: '#/components/parameters/siteIdFilter'
        - name: days
          in: query
          description: Trailing window in days for trend data
          schema: { type: integer, minimum: 7, maximum: 90, default: 30 }
      responses:
        '200':
          description: Dashboard summary
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: '#/components/schemas/Dashboard' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /reference/item-categories:
    get:
      operationId: listItemCategories
      tags: [Reference]
      summary: Item-category options
      responses:
        '200':
          description: Categories
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/ItemCategory' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /reference/units:
    get:
      operationId: listUnits
      tags: [Reference]
      summary: Unit-of-measure options
      responses:
        '200':
          description: Units
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Unit' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /reference/reasons:
    get:
      operationId: listReasons
      tags: [Reference]
      summary: Adjustment, discrepancy, and reversal reasons
      responses:
        '200':
          description: Reason codes
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/ReasonCode' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /reference/departments:
    get:
      operationId: listDepartments
      tags: [Reference]
      summary: List controlled employee departments
      responses:
        '200':
          description: Departments
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Department' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /sites:
    get:
      operationId: listSites
      tags: [Sites]
      summary: Filtered site list
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/pageSize'
        - $ref: '#/components/parameters/sort'
        - $ref: '#/components/parameters/q'
        - name: status
          in: query
          schema: { $ref: '#/components/schemas/ActiveStatus' }
        - name: type
          in: query
          schema: { $ref: '#/components/schemas/SiteType' }
      responses:
        '200':
          description: Sites page
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Site' }
                  meta: { $ref: '#/components/schemas/PageMeta' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      operationId: createSite
      tags: [Sites]
      summary: Create site
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SiteInput' }
      responses:
        '201':
          description: Site created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SiteEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationProblem' }

  /sites/{siteId}:
    parameters:
      - $ref: '#/components/parameters/siteId'
    get:
      operationId: getSite
      tags: [Sites]
      summary: Site detail and summary
      responses:
        '200':
          description: Site detail
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: '#/components/schemas/SiteDetail' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      operationId: updateSite
      tags: [Sites]
      summary: Update permitted site fields
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SiteUpdate' }
      responses:
        '200':
          description: Updated site
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SiteEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationProblem' }

  /sites/{siteId}/locations:
    parameters:
      - $ref: '#/components/parameters/siteId'
    get:
      operationId: listSiteLocations
      tags: [Sites]
      summary: Site storage locations
      responses:
        '200':
          description: Locations
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Location' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      operationId: createLocation
      tags: [Sites]
      summary: Create location
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LocationInput' }
      responses:
        '201':
          description: Location created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LocationEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationProblem' }

  /locations/{locationId}:
    parameters:
      - $ref: '#/components/parameters/locationId'
    patch:
      operationId: updateLocation
      tags: [Sites]
      summary: Update location
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LocationUpdate' }
      responses:
        '200':
          description: Updated location
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LocationEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationProblem' }

  /items:
    get:
      operationId: listItems
      tags: [Items]
      summary: Search and filter the item catalogue
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/pageSize'
        - $ref: '#/components/parameters/sort'
        - $ref: '#/components/parameters/q'
        - $ref: '#/components/parameters/siteIdFilter'
        - name: categoryId
          in: query
          schema: { $ref: '#/components/schemas/Ulid' }
        - name: inventoryType
          in: query
          schema: { $ref: '#/components/schemas/InventoryType' }
        - name: status
          in: query
          schema: { $ref: '#/components/schemas/ActiveStatus' }
        - name: stockHealth
          in: query
          schema: { $ref: '#/components/schemas/StockHealth' }
      responses:
        '200':
          description: Items page
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/ItemSummary' }
                  meta: { $ref: '#/components/schemas/PageMeta' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      operationId: createItem
      tags: [Items]
      summary: Create an item
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ItemInput' }
      responses:
        '201':
          description: Item created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ItemEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationProblem' }

  /items/{itemId}:
    parameters:
      - $ref: '#/components/parameters/itemId'
    get:
      operationId: getItem
      tags: [Items]
      summary: Item detail
      responses:
        '200':
          description: Item detail
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: '#/components/schemas/ItemDetail' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      operationId: updateItem
      tags: [Items]
      summary: Update mutable item fields
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ItemUpdate' }
      responses:
        '200':
          description: Updated item
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ItemEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationProblem' }

  /items/{itemId}/balances:
    parameters:
      - $ref: '#/components/parameters/itemId'
    get:
      operationId: getItemBalances
      tags: [Items]
      summary: Item balance by site and location
      responses:
        '200':
          description: Balances for the item
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/StockBalance' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /balances:
    get:
      operationId: listBalances
      tags: [Inventory]
      summary: Network balance search
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/pageSize'
        - $ref: '#/components/parameters/sort'
        - $ref: '#/components/parameters/q'
        - $ref: '#/components/parameters/siteIdFilter'
        - name: locationId
          in: query
          schema: { $ref: '#/components/schemas/Ulid' }
        - name: itemId
          in: query
          schema: { $ref: '#/components/schemas/Ulid' }
        - name: stockHealth
          in: query
          schema: { $ref: '#/components/schemas/StockHealth' }
      responses:
        '200':
          description: Balances page
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/StockBalance' }
                  meta: { $ref: '#/components/schemas/PageMeta' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /movements:
    get:
      operationId: listMovements
      tags: [Inventory]
      summary: Immutable ledger search
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/pageSize'
        - $ref: '#/components/parameters/sort'
        - $ref: '#/components/parameters/siteIdFilter'
        - name: itemId
          in: query
          schema: { $ref: '#/components/schemas/Ulid' }
        - name: movementType
          in: query
          schema: { $ref: '#/components/schemas/MovementType' }
        - name: from
          in: query
          schema: { type: string, format: date }
        - name: to
          in: query
          schema: { type: string, format: date }
      responses:
        '200':
          description: Movements page
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Movement' }
                  meta: { $ref: '#/components/schemas/PageMeta' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /movements/{movementId}:
    parameters:
      - $ref: '#/components/parameters/movementId'
    get:
      operationId: getMovement
      tags: [Inventory]
      summary: Movement detail
      responses:
        '200':
          description: Movement detail
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: '#/components/schemas/Movement' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /movements/{movementId}/reverse:
    parameters:
      - $ref: '#/components/parameters/movementId'
    post:
      operationId: reverseMovement
      tags: [StockActions]
      summary: Create a reversing movement
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReversalInput' }
      responses:
        '201':
          description: Reversal posted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MovementListEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationProblem' }

  /receipts:
    post:
      operationId: postReceipt
      tags: [StockActions]
      summary: Post a stock receipt
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReceiptInput' }
      responses:
        '201':
          description: Receipt posted; returns the created movements
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MovementListEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationProblem' }

  /issues:
    post:
      operationId: postIssue
      tags: [StockActions]
      summary: Post a stock issue
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/IssueInput' }
      responses:
        '201':
          description: Issue posted; returns the created movements
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MovementListEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationProblem' }

  /adjustments:
    post:
      operationId: postAdjustment
      tags: [StockActions]
      summary: Post a stock adjustment
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AdjustmentInput' }
      responses:
        '201':
          description: Adjustment posted; returns the created movement
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MovementListEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationProblem' }

  /transfers:
    get:
      operationId: listTransfers
      tags: [Transfers]
      summary: Search the transfer queue
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/pageSize'
        - $ref: '#/components/parameters/sort'
        - $ref: '#/components/parameters/q'
        - name: status
          in: query
          schema: { $ref: '#/components/schemas/TransferStatus' }
        - name: view
          in: query
          description: Operational grouping
          schema: { type: string, enum: [action, in_transit, completed, all] }
        - $ref: '#/components/parameters/siteIdFilter'
      responses:
        '200':
          description: Transfers page
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Transfer' }
                  meta: { $ref: '#/components/schemas/PageMeta' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      operationId: createTransfer
      tags: [Transfers]
      summary: Create a draft transfer
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TransferInput' }
      responses:
        '201':
          description: Draft transfer created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TransferEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationProblem' }

  /transfers/{transferId}:
    parameters:
      - $ref: '#/components/parameters/transferId'
    get:
      operationId: getTransfer
      tags: [Transfers]
      summary: Transfer detail and timeline
      responses:
        '200':
          description: Transfer detail
          content:
            application/json:
