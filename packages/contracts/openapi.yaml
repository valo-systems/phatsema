components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: phatsema_session

  parameters:
    page:
      name: page
      in: query
      schema: { type: integer, minimum: 1, default: 1 }
    pageSize:
      name: pageSize
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
    sort:
      name: sort
      in: query
      description: Sort key; prefix with '-' for descending. Unknown keys are rejected with 422.
      schema: { type: string }
    q:
      name: q
      in: query
      description: Free-text search
      schema: { type: string, maxLength: 120 }
    siteIdFilter:
      name: siteId
      in: query
      schema: { $ref: '#/components/schemas/Ulid' }
    siteId:
      name: siteId
      in: path
      required: true
      schema: { $ref: '#/components/schemas/Ulid' }
    locationId:
      name: locationId
      in: path
      required: true
      schema: { $ref: '#/components/schemas/Ulid' }
    itemId:
      name: itemId
      in: path
      required: true
      schema: { $ref: '#/components/schemas/Ulid' }
    movementId:
      name: movementId
      in: path
      required: true
      schema: { $ref: '#/components/schemas/Ulid' }
    transferId:
      name: transferId
      in: path
      required: true
      schema: { $ref: '#/components/schemas/Ulid' }
    countId:
      name: countId
      in: path
      required: true
      schema: { $ref: '#/components/schemas/Ulid' }
    assetId:
      name: assetId
      in: path
      required: true
      schema: { $ref: '#/components/schemas/Ulid' }

  requestBodies:
    VersionedAction:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [version]
            properties:
              version: { type: integer, minimum: 1 }

  responses:
    Unauthorized:
      description: No valid authenticated session
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    Forbidden:
      description: Authenticated but not authorised
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    NotFound:
      description: Resource does not exist or is not visible to the user
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    Conflict:
      description: State transition or optimistic-concurrency conflict
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    ValidationProblem:
      description: Validation or business-rule failure
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ValidationProblem' }
    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }

  schemas:
    Ulid:
      type: string
      pattern: '^[0-9A-HJKMNP-TV-Z]{26}$'
      examples: ['01JZX5T9GQK4W8B2N6M3R7VDPE']

    Timestamp:
      type: string
      format: date-time
      description: ISO 8601 UTC timestamp

    Quantity:
      type: string
      pattern: '^\d{1,10}(\.\d{1,3})?$'
      description: Non-negative decimal quantity with up to 3 decimal places, transported as a string

    SignedQuantity:
      type: string
      pattern: '^-?\d{1,10}(\.\d{1,3})?$'
      description: Signed decimal quantity with up to 3 decimal places, transported as a string

    Money:
      type: string
      pattern: '^-?\d{1,12}(\.\d{1,2})?$'
      description: Decimal monetary amount in ZAR, transported as a string (demo values are fictional)

    Version:
      type: integer
      minimum: 1
      description: Optimistic-concurrency version

    ActiveStatus:
      type: string
      enum: [active, inactive]

    SiteType:
      type: string
      enum: [head_office, warehouse, mine_site, workshop, fabrication, depot]

    LocationType:
      type: string
      enum: [warehouse, yard, workshop, cage, tank, vehicle_store, bin]

    InventoryType:
      type: string
      enum: [saleable, consumable, raw_material, spare_part, installation_component]

    TrackingMode:
      type: string
      enum: [quantity, batch, serial]

    OwnershipMode:
      type: string
      enum: [company_owned, consignment, client_owned]

    StockHealth:
      type: string
      enum: [healthy, low, out_of_stock, excess, quarantined]

    MovementType:
      type: string
      enum:
        - opening_balance
        - receipt
        - issue
        - transfer_dispatch
        - transfer_receipt
        - adjustment_increase
        - adjustment_decrease
        - count_variance
        - reversal

    TransferStatus:
      type: string
      enum: [draft, submitted, approved, dispatched, received, cancelled]

    CountStatus:
      type: string
      enum: [draft, in_progress, submitted, recount_required, reviewed, posted]

    AssetStatus:
      type: string
      enum: [available, assigned, on_hire, in_maintenance, out_of_service, retired]

    AlertType:
      type: string
      enum:
        - low_stock
        - out_of_stock
        - transfer_awaiting_approval
        - transfer_overdue
        - count_variance_review
        - asset_service_due
        - asset_service_overdue
        - demo_session_expiry

    AlertSeverity:
      type: string
      enum: [info, warning, critical]

    Problem:
      type: object
      required: [type, title, status]
      properties:
        type: { type: string }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        instance: { type: string }
        traceId: { type: string }

    ValidationProblem:
      allOf:
        - $ref: '#/components/schemas/Problem'
        - type: object
          required: [errors]
          properties:
            errors:
              type: object
              additionalProperties:
                type: array
                items: { type: string }

    PageMeta:
      type: object
      required: [page, pageSize, total]
      properties:
        page: { type: integer }
        pageSize: { type: integer }
        total: { type: integer }
        sort: { type: string }

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8, maxLength: 100 }

    User:
      type: object
      required: [id, name, preferredName, workPhone, jobTitle, departmentCode, bio, email, status, roles, permissions, assignedSiteIds, allSites, lastLoginAt, version]
      properties:
        id: { $ref: '#/components/schemas/Ulid' }
        name: { type: string }
        preferredName:
          anyOf: [{ type: string, maxLength: 80 }, { type: 'null' }]
        workPhone:
          anyOf: [{ type: string, maxLength: 32 }, { type: 'null' }]
        jobTitle:
          anyOf: [{ type: string, maxLength: 120 }, { type: 'null' }]
        departmentCode:
          anyOf: [{ type: string }, { type: 'null' }]
        bio:
          anyOf: [{ type: string, maxLength: 500 }, { type: 'null' }]
        email: { type: string, format: email }
        status: { $ref: '#/components/schemas/ActiveStatus' }
        roles:
          type: array
          items: { $ref: '#/components/schemas/Role' }
        permissions:
          type: array
          items: { type: string }
        assignedSiteIds:
          type: array
          items: { $ref: '#/components/schemas/Ulid' }
        allSites:
          type: boolean
          description: True when the user may view every site
        lastLoginAt:
          anyOf: [{ $ref: '#/components/schemas/Timestamp' }, { type: 'null' }]
        version: { $ref: '#/components/schemas/Version' }

    UserEnvelope:
      type: object
      required: [data]
      properties:
        data: { $ref: '#/components/schemas/User' }

    UserInput:
      type: object
      required: [name, email, temporaryPassword, role, allSites, assignedSiteIds]
      properties:
        name: { type: string, maxLength: 120 }
        preferredName:
          anyOf: [{ type: string, maxLength: 80 }, { type: 'null' }]
        workPhone:
          anyOf: [{ type: string, maxLength: 32 }, { type: 'null' }]
        jobTitle:
          anyOf: [{ type: string, maxLength: 120 }, { type: 'null' }]
        departmentCode:
          anyOf: [{ type: string }, { type: 'null' }]
        bio:
          anyOf: [{ type: string, maxLength: 500 }, { type: 'null' }]
        email: { type: string, format: email, maxLength: 160 }
        temporaryPassword: { type: string, minLength: 12, maxLength: 100 }
        role: { type: string, enum: [system_administrator, operations_manager, site_manager, storekeeper, executive_viewer] }
        allSites: { type: boolean }
        assignedSiteIds:
          type: array
          items: { $ref: '#/components/schemas/Ulid' }

    UserUpdate:
      type: object
      required: [version]
      properties:
        version: { $ref: '#/components/schemas/Version' }
        name: { type: string, maxLength: 120 }
        preferredName:
          anyOf: [{ type: string, maxLength: 80 }, { type: 'null' }]
        workPhone:
          anyOf: [{ type: string, maxLength: 32 }, { type: 'null' }]
        jobTitle:
          anyOf: [{ type: string, maxLength: 120 }, { type: 'null' }]
        departmentCode:
          anyOf: [{ type: string }, { type: 'null' }]
        bio:
          anyOf: [{ type: string, maxLength: 500 }, { type: 'null' }]
        temporaryPassword: { type: string, minLength: 12, maxLength: 100 }
        role: { type: string, enum: [system_administrator, operations_manager, site_manager, storekeeper, executive_viewer] }
        allSites: { type: boolean }
        assignedSiteIds:
          type: array
          items: { $ref: '#/components/schemas/Ulid' }
        status: { $ref: '#/components/schemas/ActiveStatus' }

    ProfileUpdate:
      type: object
      additionalProperties: false
      required: [version, name]
      properties:
        version: { $ref: '#/components/schemas/Version' }
        name: { type: string, minLength: 1, maxLength: 120 }
        preferredName:
          anyOf: [{ type: string, maxLength: 80 }, { type: 'null' }]
        workPhone:
          anyOf: [{ type: string, maxLength: 32 }, { type: 'null' }]
        bio:
          anyOf: [{ type: string, maxLength: 500 }, { type: 'null' }]

    PasswordChange:
      type: object
      additionalProperties: false
      required: [currentPassword, newPassword, newPasswordConfirmation]
      properties:
        currentPassword: { type: string, minLength: 1, maxLength: 100 }
        newPassword: { type: string, minLength: 12, maxLength: 100 }
        newPasswordConfirmation: { type: string, minLength: 12, maxLength: 100 }

    Role:
      type: object
      required: [id, name, permissions, isSystemRole]
      properties:
        id: { $ref: '#/components/schemas/Ulid' }
        name: { type: string }
        permissions:
          type: array
          items: { type: string }
        isSystemRole: { type: boolean }

    ItemCategory:
      type: object
      required: [id, code, name]
      properties:
        id: { $ref: '#/components/schemas/Ulid' }
        code: { type: string }
        name: { type: string }

    Unit:
      type: object
      required: [code, name, precision]
      properties:
        code: { type: string }
        name: { type: string }
        precision: { type: integer, minimum: 0, maximum: 3 }

    ReasonCode:
      type: object
      required: [code, name, appliesTo]
      properties:
        code: { type: string }
        name: { type: string }
        appliesTo:
          type: array
          items: { type: string, enum: [adjustment, discrepancy, reversal, count] }

    Department:
      type: object
      required: [code, name]
      properties:
        code: { type: string }
        name: { type: string }

    Site:
      type: object
      required: [id, code, name, entityCode, type, countryCode, timezone, status, version]
      properties:
        id: { $ref: '#/components/schemas/Ulid' }
        code: { type: string }
        name: { type: string }
        entityCode: { type: string }
        type: { $ref: '#/components/schemas/SiteType' }
        countryCode: { type: string, minLength: 2, maxLength: 2 }
        timezone: { type: string }
        status: { $ref: '#/components/schemas/ActiveStatus' }
        contactName: { type: string }
        contactPhone: { type: string }
        version: { $ref: '#/components/schemas/Version' }

    SiteDetail:
      allOf:
        - $ref: '#/components/schemas/Site'
        - type: object
          required: [locationCount, itemCount, stockValue, openTransferCount, assetCount]
          properties:
            locationCount: { type: integer }
            itemCount: { type: integer }
            stockValue: { $ref: '#/components/schemas/Money' }
            openTransferCount: { type: integer }
            assetCount: { type: integer }

    SiteEnvelope:
      type: object
      required: [data]
      properties:
        data: { $ref: '#/components/schemas/Site' }

    SiteInput:
      type: object
      required: [name, entityCode, type, countryCode, timezone]
      properties:
        name: { type: string, maxLength: 120 }
        entityCode:
          type: string
          enum: [PHATSEMA_PROJECTS, PHATSEMA_MINING]
        type: { $ref: '#/components/schemas/SiteType' }
        countryCode: { type: string, minLength: 2, maxLength: 2 }
        timezone: { type: string }
        contactName: { type: string, maxLength: 120 }
        contactPhone: { type: string, maxLength: 40 }

    SiteUpdate:
      type: object
      required: [version]
      properties:
        name: { type: string, maxLength: 120 }
        status: { $ref: '#/components/schemas/ActiveStatus' }
        contactName: { type: string, maxLength: 120 }
        contactPhone: { type: string, maxLength: 40 }
        version: { $ref: '#/components/schemas/Version' }

    Location:
      type: object
      required: [id, siteId, code, name, type, status, version]
      properties:
        id: { $ref: '#/components/schemas/Ulid' }
        siteId: { $ref: '#/components/schemas/Ulid' }
        parentLocationId:
          anyOf: [{ $ref: '#/components/schemas/Ulid' }, { type: 'null' }]
        code: { type: string }
        name: { type: string }
        type: { $ref: '#/components/schemas/LocationType' }
        status: { $ref: '#/components/schemas/ActiveStatus' }
        allowsNegativeStock: { type: boolean, const: false }
        version: { $ref: '#/components/schemas/Version' }

    LocationEnvelope:
      type: object
      required: [data]
      properties:
        data: { $ref: '#/components/schemas/Location' }

    LocationInput:
      type: object
      required: [name, type]
      properties:
        name: { type: string, maxLength: 120 }
        type: { $ref: '#/components/schemas/LocationType' }
        parentLocationId: { $ref: '#/components/schemas/Ulid' }

    LocationUpdate:
      type: object
      required: [version]
      properties:
        name: { type: string, maxLength: 120 }
        status: { $ref: '#/components/schemas/ActiveStatus' }
        version: { $ref: '#/components/schemas/Version' }

    ItemCore:
      type: object
      required: [id, sku, name, categoryId, categoryName, inventoryType, baseUnit, trackingMode, ownershipMode, status, version]
      properties:
        id: { $ref: '#/components/schemas/Ulid' }
        sku: { type: string }
        name: { type: string }
        description: { type: string }
        categoryId: { $ref: '#/components/schemas/Ulid' }
        categoryName: { type: string }
        inventoryType: { $ref: '#/components/schemas/InventoryType' }
        baseUnit: { type: string }
        trackingMode: { $ref: '#/components/schemas/TrackingMode' }
        ownershipMode: { $ref: '#/components/schemas/OwnershipMode' }
        reorderPoint:
          anyOf: [{ $ref: '#/components/schemas/Quantity' }, { type: 'null' }]
        targetLevel:
          anyOf: [{ $ref: '#/components/schemas/Quantity' }, { type: 'null' }]
        status: { $ref: '#/components/schemas/ActiveStatus' }
        version: { $ref: '#/components/schemas/Version' }

    ItemSummary:
      allOf:
        - $ref: '#/components/schemas/ItemCore'
        - type: object
          required: [totalOnHand, totalAvailable, stockHealth]
          properties:
            totalOnHand: { $ref: '#/components/schemas/Quantity' }
            totalAvailable: { $ref: '#/components/schemas/Quantity' }
            stockHealth: { $ref: '#/components/schemas/StockHealth' }

    ItemDetail:
      allOf:
        - $ref: '#/components/schemas/ItemSummary'
        - type: object
          required: [totalReserved, totalInTransit, totalQuarantined]
          properties:
            totalReserved: { $ref: '#/components/schemas/Quantity' }
            totalInTransit: { $ref: '#/components/schemas/Quantity' }
            totalQuarantined: { $ref: '#/components/schemas/Quantity' }

    ItemEnvelope:
      type: object
      required: [data]
      properties:
        data: { $ref: '#/components/schemas/ItemCore' }

    ItemInput:
      type: object
      required: [name, categoryId, inventoryType, baseUnit, trackingMode, ownershipMode]
      properties:
        name: { type: string, maxLength: 160 }
        description: { type: string, maxLength: 2000 }
        categoryId: { $ref: '#/components/schemas/Ulid' }
        inventoryType: { $ref: '#/components/schemas/InventoryType' }
        baseUnit: { type: string, maxLength: 10 }
        trackingMode: { $ref: '#/components/schemas/TrackingMode' }
        ownershipMode: { $ref: '#/components/schemas/OwnershipMode' }
        reorderPoint: { $ref: '#/components/schemas/Quantity' }
        targetLevel: { $ref: '#/components/schemas/Quantity' }

    ItemUpdate:
      type: object
      required: [version]
      properties:
        name: { type: string, maxLength: 160 }
        description: { type: string, maxLength: 2000 }
        categoryId: { $ref: '#/components/schemas/Ulid' }
        reorderPoint:
          anyOf: [{ $ref: '#/components/schemas/Quantity' }, { type: 'null' }]
        targetLevel:
          anyOf: [{ $ref: '#/components/schemas/Quantity' }, { type: 'null' }]
        status: { $ref: '#/components/schemas/ActiveStatus' }
        version: { $ref: '#/components/schemas/Version' }

    StockBalance:
      type: object
      required: [itemId, itemSku, itemName, unit, siteId, siteName, locationId, locationName, onHand, reserved, inTransit, quarantined, available, stockHealth]
      properties:
        itemId: { $ref: '#/components/schemas/Ulid' }
        itemSku: { type: string }
        itemName: { type: string }
        unit: { type: string }
        siteId: { $ref: '#/components/schemas/Ulid' }
        siteName: { type: string }
        locationId: { $ref: '#/components/schemas/Ulid' }
        locationName: { type: string }
        batchId:
          anyOf: [{ $ref: '#/components/schemas/Ulid' }, { type: 'null' }]
        onHand: { $ref: '#/components/schemas/Quantity' }
        reserved: { $ref: '#/components/schemas/Quantity' }
        inTransit: { $ref: '#/components/schemas/Quantity' }
        quarantined: { $ref: '#/components/schemas/Quantity' }
        available: { $ref: '#/components/schemas/Quantity' }
        stockHealth: { $ref: '#/components/schemas/StockHealth' }

    Movement:
      type: object
      required: [id, sequence, occurredAt, postedAt, movementType, itemId, itemSku, itemName, quantity, unit, referenceType, referenceId, referenceLabel, actorUserId, actorName, resultingBalance]
      properties:
        id: { $ref: '#/components/schemas/Ulid' }
        sequence: { type: integer }
        occurredAt: { $ref: '#/components/schemas/Timestamp' }
        postedAt: { $ref: '#/components/schemas/Timestamp' }
        movementType: { $ref: '#/components/schemas/MovementType' }
        itemId: { $ref: '#/components/schemas/Ulid' }
        itemSku: { type: string }
        itemName: { type: string }
        quantity: { $ref: '#/components/schemas/SignedQuantity' }
        unit: { type: string }
        sourceSiteId:
          anyOf: [{ $ref: '#/components/schemas/Ulid' }, { type: 'null' }]
        sourceSiteName: { anyOf: [{ type: string }, { type: 'null' }] }
        sourceLocationId:
          anyOf: [{ $ref: '#/components/schemas/Ulid' }, { type: 'null' }]
        sourceLocationName: { anyOf: [{ type: string }, { type: 'null' }] }
        destinationSiteId:
          anyOf: [{ $ref: '#/components/schemas/Ulid' }, { type: 'null' }]
        destinationSiteName: { anyOf: [{ type: string }, { type: 'null' }] }
        destinationLocationId:
          anyOf: [{ $ref: '#/components/schemas/Ulid' }, { type: 'null' }]
        destinationLocationName: { anyOf: [{ type: string }, { type: 'null' }] }
        batchId:
          anyOf: [{ $ref: '#/components/schemas/Ulid' }, { type: 'null' }]
        referenceType: { type: string }
        referenceId: { type: string }
        referenceLabel: { type: string }
        reasonCode: { anyOf: [{ type: string }, { type: 'null' }] }
        notes: { anyOf: [{ type: string }, { type: 'null' }] }
        actorUserId: { $ref: '#/components/schemas/Ulid' }
        actorName: { type: string }
        reversalOfId:
          anyOf: [{ $ref: '#/components/schemas/Ulid' }, { type: 'null' }]
        reversedById:
          anyOf: [{ $ref: '#/components/schemas/Ulid' }, { type: 'null' }]
        resultingBalance: { $ref: '#/components/schemas/Quantity' }
        auditEventId:
          anyOf: [{ $ref: '#/components/schemas/Ulid' }, { type: 'null' }]

    MovementListEnvelope:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Movement' }

    ReceiptLineInput:
      type: object
      required: [itemId, quantity]
      properties:
        itemId: { $ref: '#/components/schemas/Ulid' }
        quantity: { $ref: '#/components/schemas/Quantity' }
        batchCode: { type: string, maxLength: 40 }

    ReceiptInput:
      type: object
      required: [siteId, locationId, reference, receivedAt, lines]
      properties:
        siteId: { $ref: '#/components/schemas/Ulid' }
        locationId: { $ref: '#/components/schemas/Ulid' }
        reference: { type: string, maxLength: 60, description: 'Supplier or delivery reference' }
        receivedAt: { type: string, format: date }
        notes: { type: string, maxLength: 1000 }
        lines:
          type: array
          minItems: 1
          maxItems: 50
          items: { $ref: '#/components/schemas/ReceiptLineInput' }

    IssueLineInput:
      type: object
      required: [itemId, quantity]
      properties:
        itemId: { $ref: '#/components/schemas/Ulid' }
        quantity: { $ref: '#/components/schemas/Quantity' }

    IssueInput:
      type: object
      required: [siteId, locationId, purpose, recipient, lines]
      properties:
        siteId: { $ref: '#/components/schemas/Ulid' }
        locationId: { $ref: '#/components/schemas/Ulid' }
        purpose:
          type: string
          enum: [site_consumption, project, maintenance, fabrication_job, cost_centre]
        reference: { type: string, maxLength: 60, description: 'Project, job, asset, or cost-centre reference' }
        recipient: { type: string, maxLength: 120 }
        notes: { type: string, maxLength: 1000 }
        lines:
          type: array
          minItems: 1
          maxItems: 50
          items: { $ref: '#/components/schemas/IssueLineInput' }

    AdjustmentInput:
      type: object
      required: [siteId, locationId, itemId, direction, quantity, reasonCode, adjustedAt]
      properties:
        siteId: { $ref: '#/components/schemas/Ulid' }
        locationId: { $ref: '#/components/schemas/Ulid' }
        itemId: { $ref: '#/components/schemas/Ulid' }
        direction: { type: string, enum: [increase, decrease] }
        quantity: { $ref: '#/components/schemas/Quantity' }
        reasonCode: { type: string }
        adjustedAt: { type: string, format: date }
        notes: { type: string, maxLength: 1000, description: Evidence notes }

    ReversalInput:
      type: object
      required: [reasonCode]
      properties:
        reasonCode: { type: string }
        notes: { type: string, maxLength: 1000 }

    TransferLine:
      type: object
      required: [id, itemId, itemSku, itemName, unit, requestedQuantity]
      properties:
        id: { $ref: '#/components/schemas/Ulid' }
        itemId: { $ref: '#/components/schemas/Ulid' }
        itemSku: { type: string }
        itemName: { type: string }
        unit: { type: string }
        requestedQuantity: { $ref: '#/components/schemas/Quantity' }
        dispatchedQuantity:
          anyOf: [{ $ref: '#/components/schemas/Quantity' }, { type: 'null' }]
        receivedQuantity:
          anyOf: [{ $ref: '#/components/schemas/Quantity' }, { type: 'null' }]
        rejectedQuantity:
          anyOf: [{ $ref: '#/components/schemas/Quantity' }, { type: 'null' }]
        discrepancyReason: { anyOf: [{ type: string }, { type: 'null' }] }

    TransferEvent:
      type: object
      required: [status, at, byUserId, byName]
      properties:
        status: { $ref: '#/components/schemas/TransferStatus' }
        at: { $ref: '#/components/schemas/Timestamp' }
        byUserId: { $ref: '#/components/schemas/Ulid' }
        byName: { type: string }
        note: { anyOf: [{ type: string }, { type: 'null' }] }

    Transfer:
      type: object
      required: [id, transferNumber, sourceSiteId, sourceSiteName, sourceLocationId, sourceLocationName, destinationSiteId, destinationSiteName, destinationLocationId, destinationLocationName, status, requestedBy, requestedByName, lines, timeline, hasDiscrepancy, version]
      properties:
        id: { $ref: '#/components/schemas/Ulid' }
        transferNumber: { type: string }
        sourceSiteId: { $ref: '#/components/schemas/Ulid' }
        sourceSiteName: { type: string }
        sourceLocationId: { $ref: '#/components/schemas/Ulid' }
        sourceLocationName: { type: string }
        destinationSiteId: { $ref: '#/components/schemas/Ulid' }
        destinationSiteName: { type: string }
        destinationLocationId: { $ref: '#/components/schemas/Ulid' }
        destinationLocationName: { type: string }
        status: { $ref: '#/components/schemas/TransferStatus' }
        requestedBy: { $ref: '#/components/schemas/Ulid' }
        requestedByName: { type: string }
        approvedBy:
          anyOf: [{ $ref: '#/components/schemas/Ulid' }, { type: 'null' }]
        dispatchedBy:
