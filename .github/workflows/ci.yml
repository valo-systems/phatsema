name: Continuous integration

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend, contracts, and documentation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test:coverage
      - run: pnpm build
      - run: pnpm contract:check-drift
      - run: pnpm fixtures:validate
      - run: pnpm php:parse
      - run: pnpm dead-code:check
      - run: pnpm docs:check

  backend:
    name: Laravel quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          coverage: none
          tools: composer:v2
      - id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ runner.os }}-${{ hashFiles('apps/api/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-
      - run: composer install --no-interaction --prefer-dist
      - run: composer validate --strict
      - run: vendor/bin/pint --test
      - run: vendor/bin/phpstan analyse --no-progress --memory-limit=1G
      - run: php artisan test

  browser:
    name: Browser acceptance
    needs: [frontend, backend]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          coverage: none
          tools: composer:v2
      - run: pnpm install --frozen-lockfile
      - run: composer install --no-interaction --prefer-dist
        working-directory: apps/api
      - run: cp .env.example .env && php artisan key:generate
        working-directory: apps/api
      - run: pnpm exec playwright install --with-deps chromium firefox webkit
        working-directory: apps/web
      - run: pnpm test:e2e
      - name: Upload Playwright failure evidence
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-failure-evidence
          path: |
            apps/web/playwright-report
            apps/web/test-results
          if-no-files-found: ignore
          retention-days: 14

  deployment:
    name: cPanel bundle integrity
    needs: [frontend, backend]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - run: bash scripts/deploy-cpanel.sh --check
