name: Continuous integration

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend, contracts, and documentation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          coverage: none
          tools: composer:v2
      - run: pnpm install --frozen-lockfile
      - run: composer install --no-interaction --prefer-dist --no-progress
        working-directory: apps/api
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test:coverage
      - run: pnpm build
      - run: pnpm contract:check-drift
      - run: pnpm fixtures:validate
      - run: pnpm php:parse
      - run: pnpm dead-code:check
      - run: pnpm docs:check

  backend:
    name: Laravel quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      APP_ENV: testing
      APP_KEY: "base64:JTbeg0xrNhaRIBT/752e0sxjIhDTv3bh1Xwn+CljyIs="
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          coverage: none
          tools: composer:v2
      - id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ runner.os }}-${{ hashFiles('apps/api/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-
      - run: composer install --no-interaction --prefer-dist
      - run: composer validate --strict
      - run: vendor/bin/pint --test
      - run: vendor/bin/phpstan analyse --no-progress --memory-limit=1G
      - run: php artisan test

  browser:
    name: Browser acceptance
    needs: [frontend, backend]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          coverage: none
          tools: composer:v2
      - run: pnpm install --frozen-lockfile
      - run: composer install --no-interaction --prefer-dist
        working-directory: apps/api
      - run: cp .env.example .env && php artisan key:generate
        working-directory: apps/api
      - run: pnpm exec playwright install --with-deps chromium firefox webkit
        working-directory: apps/web
      - run: pnpm test:e2e
      - name: Upload Playwright failure evidence
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-failure-evidence
          path: |
            apps/web/playwright-report
            apps/web/test-results
          if-no-files-found: ignore
          retention-days: 14

  deployment:
    name: cPanel bundle integrity
    needs: [frontend, backend]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - run: bash scripts/deploy-cpanel.sh --check

  production:
    name: Build and deploy production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [frontend, backend, browser, deployment]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    env:
      CPANEL_HOST: ${{ vars.CPANEL_HOST }}
      CPANEL_PORT: ${{ vars.CPANEL_PORT }}
      CPANEL_REPOSITORY: ${{ vars.CPANEL_REPOSITORY }}
      CPANEL_USER: ${{ vars.CPANEL_USER }}
      PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          coverage: none
          tools: composer:v2
      - run: pnpm install --frozen-lockfile
      - run: composer install --no-interaction --prefer-dist --no-progress
        working-directory: apps/api
      - name: Prepare deployment branch
        run: |
          git config user.name "Valo Systems Release Bot"
          git config user.email "engineering@valosystems.co.za"
          if git fetch origin cpanel-release; then
            git switch --force-create cpanel-release origin/cpanel-release
            git merge --no-edit "$GITHUB_SHA"
          else
            git switch --create cpanel-release "$GITHUB_SHA"
          fi
      - run: pnpm build
      - name: Package tested revision
        env:
          PHATSEMA_SOURCE_REVISION: ${{ github.sha }}
          PHATSEMA_SOURCE_TREE_DIRTY: "false"
        run: pnpm release:package
      - name: Commit release bundle
        run: |
          git add release/phatsema-portal-1.0.0.tar.gz release/phatsema-portal-1.0.0.tar.gz.sha256
          git commit --allow-empty -m "Deploy ${GITHUB_SHA}"
          git push origin cpanel-release
      - name: Configure cPanel SSH
        env:
          CPANEL_KNOWN_HOSTS: ${{ secrets.CPANEL_KNOWN_HOSTS }}
          CPANEL_SSH_PRIVATE_KEY: ${{ secrets.CPANEL_SSH_PRIVATE_KEY }}
        run: |
          install -m 700 -d "$HOME/.ssh"
          printf '%s\n' "$CPANEL_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          printf '%s\n' "$CPANEL_SSH_PRIVATE_KEY" > "$HOME/.ssh/cpanel_deploy"
          chmod 600 "$HOME/.ssh/known_hosts" "$HOME/.ssh/cpanel_deploy"
      - name: Push to cPanel and run native deployment hook
        run: |
          git remote add cpanel "ssh://${CPANEL_USER}@${CPANEL_HOST}:${CPANEL_PORT}${CPANEL_REPOSITORY}"
          GIT_SSH_COMMAND="ssh -i $HOME/.ssh/cpanel_deploy -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -p ${CPANEL_PORT}" \
            git push cpanel HEAD:main
      - name: Confirm cPanel deployment
        run: |
          release_sha="$(git rev-parse HEAD)"
          for attempt in $(seq 1 30); do
            deployments="$(
              ssh -i "$HOME/.ssh/cpanel_deploy" \
                -o IdentitiesOnly=yes \
                -o StrictHostKeyChecking=yes \
                -p "$CPANEL_PORT" \
                "${CPANEL_USER}@${CPANEL_HOST}" \
                "/usr/bin/uapi --output=json VersionControlDeployment retrieve"
            )"
            deployment="$(
              jq -c \
                --arg repository "$CPANEL_REPOSITORY" \
                --arg revision "$release_sha" \
                '[.result.data[] |
                  select(
                    .repository_root == $repository and
                    .repository_state.identifier == $revision
                  )
                ] | sort_by(.deploy_id) | last // empty' \
                <<< "$deployments"
            )"

            if [[ -z "$deployment" ]]; then
              sleep 2
              continue
            fi
            if jq -e '.timestamps.succeeded' <<< "$deployment" > /dev/null; then
              echo "cPanel deployed release ${release_sha}."
              exit 0
            fi
            if jq -e '.timestamps.failed' <<< "$deployment" > /dev/null; then
              log_path="$(jq -r '.log_path' <<< "$deployment")"
              echo "cPanel deployment failed. Server log follows:" >&2
              ssh -i "$HOME/.ssh/cpanel_deploy" \
                -o IdentitiesOnly=yes \
                -o StrictHostKeyChecking=yes \
                -p "$CPANEL_PORT" \
                "${CPANEL_USER}@${CPANEL_HOST}" \
                "sed -n '1,260p' '$log_path'" >&2
              exit 1
            fi
            sleep 2
          done

          echo "Timed out waiting for cPanel deployment confirmation." >&2
          exit 1
      - name: Verify production
        run: |
          curl --fail --silent --show-error --retry 5 --retry-delay 3 "${PRODUCTION_URL}/" > /dev/null
          auth_status="$(curl --silent --output /dev/null --write-out '%{http_code}' --retry 5 --retry-delay 3 "${PRODUCTION_URL}/api/v1/auth/me")"
          test "$auth_status" = "401"
